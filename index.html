<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seall.dev — Games & Puzzles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1f2e;
            min-height: 100vh;
            color: #e0e6ed;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px 40px;
        }

        h1 {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 48px;
            color: #e0e6ed;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .card {
            background: #2d3748;
            border-radius: 12px;
            padding: 28px 24px;
            text-decoration: none;
            color: #e0e6ed;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 2px solid transparent;
            transition: border-color 0.2s, transform 0.15s, background 0.2s;
        }

        .card:hover {
            border-color: #4299e1;
            background: #3a4a61;
            transform: translateY(-3px);
        }

        .card-icon {
            font-size: 2.5rem;
            line-height: 1;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
        }

        footer {
            margin-top: auto;
            padding-top: 48px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            color: #9ca3af;
        }

        footer a {
            color: #4299e1;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>assorted puzzles</h1>

    <div class="grid">
        <a class="card" href="/flags/">
            <div class="card-icon" id="flags-icon"></div>
            <div class="card-title">Flags of the World</div>
        </a>
        <a class="card" href="/crossword/">
            <div class="card-icon">✏️</div>
            <div class="card-title">NYT Crossword</div>
        </a>
        <a class="card" href="/tld/">
            <div class="card-icon" id="tld-icon" style="font-family:'Courier New',monospace;font-size:1.6rem;font-weight:bold;color:#4299e1"></div>
            <div class="card-title">Country TLDs</div>
        </a>
        <!-- Add more game cards here -->
    </div>

    <footer>Made by <a href="https://seall.dev" target="_blank">seall.dev</a></footer>

    <script>
        // Pick a random country and show its flag emoji + matching TLD
        const COUNTRY_TLD_PAIRS = [
            {code:'FR',tld:'.fr'},{code:'DE',tld:'.de'},{code:'JP',tld:'.jp'},
            {code:'TV',tld:'.tv'},{code:'ME',tld:'.me'},{code:'LY',tld:'.ly'},
            {code:'CO',tld:'.co'},{code:'FM',tld:'.fm'},{code:'TO',tld:'.to'},
            {code:'LA',tld:'.la'},{code:'BR',tld:'.br'},{code:'IN',tld:'.in'},
            {code:'AU',tld:'.au'},{code:'CA',tld:'.ca'},{code:'IT',tld:'.it'},
            {code:'ES',tld:'.es'},{code:'RU',tld:'.ru'},{code:'CN',tld:'.cn'},
            {code:'MX',tld:'.mx'},{code:'NG',tld:'.ng'},{code:'ZA',tld:'.za'},
            {code:'SE',tld:'.se'},{code:'NO',tld:'.no'},{code:'NZ',tld:'.nz'},
            {code:'KR',tld:'.kr'},{code:'SG',tld:'.sg'},{code:'CH',tld:'.ch'},
            {code:'PL',tld:'.pl'},{code:'AR',tld:'.ar'},{code:'EG',tld:'.eg'},
        ];
        const pair = COUNTRY_TLD_PAIRS[Math.floor(Math.random() * COUNTRY_TLD_PAIRS.length)];
        const flagEmoji = String.fromCodePoint(...[...pair.code].map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
        document.getElementById('flags-icon').textContent = flagEmoji;
        document.getElementById('tld-icon').textContent = pair.tld;
    </script>
</body>
</html>

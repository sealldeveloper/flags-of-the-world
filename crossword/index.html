<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crosswords — seall.dev</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#1a1f2e;min-height:100vh;color:#e0e6ed;display:flex;flex-direction:column;align-items:center;padding:60px 20px 40px;}
    .back-link{color:#4299e1;text-decoration:none;font-size:.88rem;align-self:flex-start;margin-bottom:32px;}
    .back-link:hover{text-decoration:underline;}
    h1{font-size:1.8rem;font-weight:bold;margin-bottom:48px;color:#e0e6ed;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;width:100%;max-width:900px;}
    .card{background:#2d3748;border-radius:12px;padding:28px 24px;text-decoration:none;color:#e0e6ed;display:flex;flex-direction:column;gap:8px;border:2px solid transparent;transition:border-color .2s,transform .15s,background .2s;}
    .card:hover{border-color:#4299e1;background:#3a4a61;transform:translateY(-3px);}
    .card-icon{font-size:2.5rem;line-height:1;}
    .card-title{font-size:1.1rem;font-weight:bold;}
    .card-desc{font-size:.82rem;color:#9ca3af;line-height:1.4;}
    footer{margin-top:auto;padding-top:48px;font-family:'Courier New',Courier,monospace;font-size:12px;color:#9ca3af;}
    footer a{color:#4299e1;text-decoration:none;}
    footer a:hover{text-decoration:underline;}
  </style>
</head>
<body>
  <a href="/" class="back-link">&#8592; home</a>
  <h1>crosswords</h1>

  <div class="grid">
    <a class="card" href="/crossword-nyt/">
      <div class="card-icon">🗽</div>
      <div class="card-title">NYT Daily</div>
      <div class="card-desc">Today's New York Times crossword and the full archive.</div>
    </a>
    <a class="card" href="/crossword-nytmini/">
      <div class="card-icon">⚡</div>
      <div class="card-title">NYT Mini</div>
      <div class="card-desc">Today's NYT Mini and the full archive. Quick 5x5 puzzles.</div>
    </a>
    <a class="card" href="/crossword-seattle/">
      <div class="card-icon">🌲</div>
      <div class="card-title">Seattle Times</div>
      <div class="card-desc">NYT-syndicated puzzles published on a delay via the Seattle Times.</div>
    </a>
  </div>

  <footer>Made by <a href="https://seall.dev" target="_blank">seall.dev</a></footer>
</body>
</html>
